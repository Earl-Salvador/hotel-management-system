{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Booking Calendar</h2>
        {% if current_user.role != 'admin' %}
        <a href="{{ url_for('bookings.book') }}" class="btn btn-primary">Book a Room</a>
        {% endif %}
    </div>

    <div class="card shadow">
        <div class="card-body">
            <div id="calendar"></div>
        </div>
    </div>
</div>

<!-- FullCalendar CSS & JS -->
<link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.css' rel='stylesheet' />
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.js'></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');
    var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,timeGridWeek,timeGridDay'
        },
        events: '{{ url_for("bookings.calendar_data") }}',
        eventClick: function(info) {
            // Show detailed popup on click
            const props = info.event.extendedProps;
            Swal.fire({
                title: `Booking Details`,
                html: `
                    <p><strong>Guest:</strong> ${props.guest}</p>
                    <p><strong>Room:</strong> ${props.room}</p>
                    <p><strong>Check-in:</strong> ${props.check_in}</p>
                    <p><strong>Check-out:</strong> ${props.check_out}</p>
                    <p><strong>Nights:</strong> ${props.nights}</p>
                `,
                icon: 'info',
                confirmButtonColor: '#92B775'
            });
        },
        eventDidMount: function(info) {
            // Add tooltip on hover
            const props = info.event.extendedProps;
            info.el.setAttribute('title', `${props.guest} - ${props.room} (${props.nights} nights)`);
        },
        height: 'auto',
        weekends: true,
        nowIndicator: true,
        locale: 'en'
    });
    calendar.render();
});
</script>

<style>
.fc-event {
    cursor: pointer;
}
.fc-event-title {
    font-weight: bold;
}
</style>
{% endblock %}
