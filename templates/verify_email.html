{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4>Verify Your Email</h4>
            </div>
            <div class="card-body text-center">
                <i class="fas fa-envelope fa-4x mb-3 text-primary"></i>
                <p>We've sent a verification link to your email address.</p>
                <p>Please check your inbox and click the link to complete your registration.</p>
                <p class="text-muted small">The link will expire in 10 minutes.</p>
                <hr>
                <p class="text-muted small">Didn't receive the email?</p>
                <a href="{{ url_for('auth.resend_verification') }}" class="btn btn-outline-primary">Resend Verification Link</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
