{% extends "base.html" %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 90vh; padding-top: 50px; padding-bottom: 50px;">
    <div class="row justify-content-center w-100">
        <div class="col-md-8 col-lg-6">
            <div class="feature-card shadow-lg p-5 border-0" style="background-color: var(--white-card); border-radius: 20px;">
                <div class="text-center mb-4">
                    <h2 class="fw-bold mb-1" style="color: var(--sidebar-green);">Set New Password</h2>
                    <p class="small text-muted">Create a strong password</p>
                </div>

                <form method="POST">
                    <div class="mb-3">
                        <label for="password" class="form-label small fw-bold" style="color: var(--sidebar-green);">New Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control bg-light border-start-0 ps-0" id="password" name="password" placeholder="••••••••" required style="font-size: 0.9rem;">
                        </div>
                        <small class="text-muted" style="font-size: 0.75rem;">At least 8 characters with uppercase, lowercase, and a number.</small>
                    </div>

                    <div class="mb-4">
                        <label for="confirm_password" class="form-label small fw-bold" style="color: var(--sidebar-green);">Confirm Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0 text-muted"><i class="fas fa-check-double"></i></span>
                            <input type="password" class="form-control bg-light border-start-0 ps-0" id="confirm_password" name="confirm_password" placeholder="••••••••" required style="font-size: 0.9rem;">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-custom-go w-100 py-2 mb-3 shadow-sm">
                        Update Password <i class="fas fa-key ms-2"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
document.querySelector('form').addEventListener('submit', function(e) {
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm_password').value;
    const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;

    let errors = [];
    if (!passwordRegex.test(password)) {
        errors.push("Password must be at least 8 characters with uppercase, lowercase, and a number.");
    }
    if (password !== confirm) {
        errors.push("Passwords do not match.");
    }

    if (errors.length > 0) {
        e.preventDefault();
        Swal.fire({
            icon: 'error',
            title: 'Validation Error',
            html: errors.join('<br>'),
            confirmButtonColor: '#92B775'
        });
    }
});
</script>
{% endblock %}
